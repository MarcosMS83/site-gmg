<script>

/* ========================================= */
/* ABAS */
/* ========================================= */

function abrirAba(id, botao){

  const abas =
    document.querySelectorAll(
      ".tab-content"
    );

  abas.forEach(function(aba){

    aba.style.display = "none";

  });

  const botoes =
    document.querySelectorAll(
      ".tab-button"
    );

  botoes.forEach(function(btn){

    btn.classList.remove("active");

  });

  document.getElementById(id)
    .style.display = "block";

  botao.classList.add("active");

}

/* ========================================= */
/* PDF GMG CARENADO */
/* ========================================= */

async function gerarPDF(){

  const potencia =
    document.getElementById("potencia").value;

  const altura =
    parseInt(
      document.getElementById("altura").value
    );

  const largura =
    parseInt(
      document.getElementById("largura").value
    );

  const comprimento =
    parseInt(
      document.getElementById("comprimento").value
    );

  const peso =
    document.getElementById("peso").value;

  if(
    !potencia ||
    !altura ||
    !largura ||
    !comprimento
  ){

    alert("Preencha os campos obrigatórios.");

    return;

  }

  const larguraBase =
    largura + 2000;

  const comprimentoBase =
    comprimento + 2000;

  /*
  COORDENADAS
  */

  const alturaX = 85;
  const alturaY = 430;

  const larguraX = 620;
  const larguraY = 325;

  const comprimentoX = 235;
  const comprimentoY = 328;

  const larguraBaseX = 85;
  const larguraBaseY = 218;

  const comprimentoBase1X = 235;
  const comprimentoBase1Y = 297;

  const comprimentoBase2X = 620;
  const comprimentoBase2Y = 210;

  const potenciaX = 710;
  const potenciaY = 32;

  const pesoX = 605;
  const pesoY = 60;

  /*
  PDF
  */

  const existingPdfBytes =
    await fetch(
      "Dimensional GMG 25 KVA.pdf"
    ).then(res => res.arrayBuffer());

  const pdfDoc =
    await PDFLib.PDFDocument.load(
      existingPdfBytes
    );

  const page =
    pdfDoc.getPages()[0];

  const black =
    PDFLib.rgb(0,0,0);

  const font =
    await pdfDoc.embedFont(
      PDFLib.StandardFonts.Helvetica
    );

  /*
  TEXTOS
  */

  page.drawText(
    String(altura),
    {
      x:alturaX,
      y:alturaY,
      size:7,
      font:font,
      color:black
    }
  );

  page.drawText(
    String(largura),
    {
      x:larguraX,
      y:larguraY,
      size:7,
      font:font,
      color:black
    }
  );

  page.drawText(
    String(comprimento),
    {
      x:comprimentoX,
      y:comprimentoY,
      size:7,
      font:font,
      color:black
    }
  );

  page.drawText(
    String(larguraBase),
    {
      x:larguraBaseX,
      y:larguraBaseY,
      size:7,
      font:font,
      color:black
    }
  );

  page.drawText(
    String(comprimentoBase),
    {
      x:comprimentoBase1X,
      y:comprimentoBase1Y,
      size:7,
      font:font,
      color:black
    }
  );

  page.drawText(
    String(comprimentoBase),
    {
      x:comprimentoBase2X,
      y:comprimentoBase2Y,
      size:7,
      font:font,
      color:black
    }
  );

  if(peso){

    page.drawText(
      `Peso: ${peso} kg`,
      {
        x:pesoX,
        y:pesoY,
        size:7,
        font:font,
        color:black
      }
    );

  }

  page.drawText(
    `${potencia}kVA`,
    {
      x:potenciaX,
      y:potenciaY,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  SALVAR
  */

  const pdfBytes =
    await pdfDoc.save();

  download(
    pdfBytes,
    `GMG_${potencia}kVA.pdf`,
    "application/pdf"
  );

}
