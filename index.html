<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Geradores - PDF</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/downloadjs@1.4.7"></script>

<style>

body{
  font-family:Arial;
  background:#f4f4f4;
  padding:40px;
}

.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.logo-area{
  text-align:center;
  margin-bottom:20px;
}

.logo-ms{
  max-width:91px;
}

h1{
  margin-bottom:15px;
  color:#0f4ea8;
  text-align:center;
}

.subtitle{
  margin-bottom:30px;
  color:#666;
  text-align:center;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:30px;
}

.tab-button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:#ddd;
  font-weight:bold;
  font-size:16px;
}

.tab-button.active{
  background:#0f4ea8;
  color:white;
}

.tab-content{
  display:none;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  border:1px solid #ddd;
  padding:20px;
  border-radius:12px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:bold;
}

input{
  width:100%;
  padding:14px;
  border:1px solid #ccc;
  border-radius:10px;
  font-size:16px;
}

small{
  color:#777;
  display:block;
  margin-top:6px;
}

button{
  width:100%;
  padding:18px;
  border:none;
  background:#0f4ea8;
  color:white;
  font-size:18px;
  border-radius:12px;
  cursor:pointer;
  margin-top:30px;
  font-weight:bold;
}

button:hover{
  background:#0b3d84;
}

</style>

</head>

<body>

<div class="container">

<div class="logo-area">

<img
  src="logo.jpeg"
  alt="MS Geradores"
  class="logo-ms"
>

</div>

<h1>MS GERADORES</h1>

<!-- ========================================= -->
<!-- ABAS -->
<!-- ========================================= -->

<div class="tabs">

<button
  class="tab-button active"
  onclick="abrirAba('aba-gmg', this)"
>
GMG CARENADO
</button>

<button
  class="tab-button"
  onclick="abrirAba('aba-sala', this)"
>
SALA GMG ABERTO
</button>

</div>

<!-- ========================================= -->
<!-- ABA GMG -->
<!-- ========================================= -->

<div
  id="aba-gmg"
  class="tab-content"
  style="display:block;"
>

<div class="subtitle">
Gerador automático de PDF dimensional
</div>

<div class="grid">

<div class="card">

<label>Potência (kVA)</label>
<input type="number" id="potencia">

</div>

<div class="card">

<label>Largura (mm)</label>
<input type="number" id="largura">

</div>

<div class="card">

<label>Altura (mm)</label>
<input type="number" id="altura">

</div>

<div class="card">

<label>Comprimento (mm)</label>
<input type="number" id="comprimento">

</div>

<div class="card">

<label>Peso (kg) - Opcional</label>
<input type="number" id="peso">

<small>
Se deixar vazio o peso não será inserido no PDF
</small>

</div>

</div>

<button onclick="gerarPDF()">
GERAR PDF
</button>

</div>

<!-- ABA SALA -->

<div class="card">
<label>Largura GMG (mm)</label>
<input type="number" id="gmgLargura">
</div>

<div class="card">
<label>Largura Atenuador Entrada (mm)</label>
<input type="number" id="entradaLargura">
</div>

<div class="card">
<label>Comprimento Atenuador Entrada (mm)</label>
<input type="number" id="entradaComprimento">
</div>

<div class="card">
<label>Altura Atenuador Entrada (mm)</label>
<input type="number" id="entradaAltura">
</div>

<div class="card">
<label>Largura Atenuador Saída (mm)</label>
<input type="number" id="saidaLargura">
</div>
