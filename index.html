<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Geradores - Dimensional GMG</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/downloadjs@1.4.7"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#f3f5f9;
  padding:40px;
}

.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  color:#0f4ea8;
  margin-bottom:10px;
  font-size:40px;
}

.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:40px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
}

.field{
  display:flex;
  flex-direction:column;
}

label{
  margin-bottom:8px;
  font-weight:bold;
}

input{
  padding:15px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  width:100%;
  margin-top:35px;
  padding:18px;
  border:none;
  border-radius:14px;
  background:#0f4ea8;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#09397d;
}

.info{
  margin-top:30px;
  background:#eef3ff;
  padding:20px;
  border-radius:12px;
  line-height:1.7;
}

.footer{
  margin-top:30px;
  text-align:center;
  color:#777;
}

@media(max-width:700px){

  body{
    padding:15px;
  }

  .container{
    padding:20px;
  }

  .grid{
    grid-template-columns:1fr;
  }

}

</style>

</head>

<body>

<div class="container">

<h1>MS GERADORES</h1>

<div class="subtitle">
Gerador Automático de Dimensionais
</div>

<div class="grid">

<div class="field">
<label>Potência (KVA)</label>
<input type="number" id="potencia" placeholder="Ex: 180">
</div>

<div class="field">
<label>Comprimento (mm)</label>
<input type="number" id="comprimento" placeholder="Ex: 3240">
</div>

<div class="field">
<label>Largura (mm)</label>
<input type="number" id="largura" placeholder="Ex: 1130">
</div>

<div class="field">
<label>Altura (mm)</label>
<input type="number" id="alturaGmg" placeholder="Ex: 1580">
</div>

</div>

<button onclick="gerarPDF()">
GERAR E BAIXAR PDF
</button>

<div class="info">

<b>IMPORTANTE:</b>

<br><br>

No GitHub deve existir:

<br><br>

<b>
index.html
<br>
Dimensional GMG 180KVA.pdf
</b>

</div>

<div class="footer">
MS Geradores © Sistema Automático
</div>

</div>

<script>

async function gerarPDF(){

  const potencia =
    document.getElementById("potencia").value || "180";

  const comprimento = parseInt(
    document.getElementById("comprimento").value || "3240"
  );

  const largura = parseInt(
    document.getElementById("largura").value || "1130"
  );

  const altura = parseInt(
    document.getElementById("alturaGmg").value || "1580"
  );

  /*
    REGRAS
  */

  const comprimentoBase = comprimento + 2000;

  const larguraBase = largura + 2000;

  /*
    CARREGA PDF
  */

  const existingPdfBytes = await fetch(
    "Dimensional GMG 180KVA.pdf"
  ).then(res => res.arrayBuffer());

  const pdfDoc =
    await PDFLib.PDFDocument.load(existingPdfBytes);

  const page = pdfDoc.getPages()[0];

  const white = PDFLib.rgb(1,1,1);

  const black = PDFLib.rgb(0,0,0);

  /*
    APAGAR TEXTOS
  */

  function apagar(x,y,w,h){

    page.drawRectangle({
      x,
      y,
      width:w,
      height:h,
      color:white
    });

  }

  /*
    APAGANDO MEDIDAS
  */

  apagar(110,165,100,20);
  apagar(290,80,100,20);
  apagar(75,445,100,20);
  apagar(470,445,100,20);
  apagar(630,330,100,20);
  apagar(230,330,100,20);
  apagar(350,18,260,20);

  /*
    3240 -> comprimento
  */

  page.drawText(String(comprimento),{
    x:235,
    y:333,
    size:12,
    color:black
  });

  /*
    5240 -> comprimento + 2000
  */

  page.drawText(String(comprimentoBase),{
    x:300,
    y:82,
    size:12,
    color:black
  });

  page.drawText(String(comprimentoBase),{
    x:475,
    y:448,
    size:12,
    color:black
  });

  /*
    3130 -> largura + 2000
  */

  page.drawText(String(larguraBase),{
    x:120,
    y:168,
    size:12,
    color:black
  });

  /*
    1130 -> largura
  */

  page.drawText(String(largura),{
    x:80,
    y:448,
    size:12,
    color:black
  });

  /*
    1580 -> altura
  */

  page.drawText(String(altura),{
    x:635,
    y:333,
    size:12,
    color:black
  });

  /*
    TITULO
  */

  page.drawText(
    `DIMENSIONAL COM BASE GMG ${potencia}KVA -`,
    {
      x:355,
      y:20,
      size:11,
      color:black
    }
  );

  /*
    SALVAR PDF
  */

  const pdfBytes = await pdfDoc.save();

  download(
    pdfBytes,
    `Dimensional_GMG_${potencia}KVA.pdf`,
    "application/pdf"
  );

}

</script>

</body>

</html>
