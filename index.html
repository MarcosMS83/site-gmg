<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Geradores</title>

<style>

body{
  font-family:Arial;
  background:#f4f4f4;
  padding:40px;
  margin:0;
}

.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:50px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.logo-area{
  text-align:center;
  margin-bottom:20px;
}

.logo-ms{
  max-width:100px;
}

h1{
  text-align:center;
  color:#0f4ea8;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:40px;
  font-size:18px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:25px;
}

.card{
  border:1px solid #ddd;
  border-radius:16px;
  padding:35px 25px;
  text-align:center;
  transition:0.2s;
  cursor:pointer;
  text-decoration:none;
  color:#333;
  background:white;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 8px 25px rgba(0,0,0,0.12);
}

.card-title{
  font-size:22px;
  font-weight:bold;
  color:#0f4ea8;
  margin-bottom:15px;
}

.card-text{
  color:#666;
  line-height:1.5;
}

@media(max-width:900px){

  .grid{
    grid-template-columns:1fr;
  }

}

</style>

</head>

<body>

<div class="container">

<div class="logo-area">

<img
  src="logo.jpeg"
  alt="MS Geradores"
  class="logo-ms"
>

</div>

<h1>MS GERADORES</h1>

<div class="subtitle">
Selecione o tipo de layout desejado
</div>

<div class="grid">

<!-- ========================================= -->
<!-- CARENADO -->
<!-- ========================================= -->

<a
  href="carenado.html"
  class="card"
>

<div class="card-title">
GMG CARENADO
</div>

<div class="card-text">
Layout dimensional para geradores carenados
</div>

</a>

<!-- ========================================= -->
<!-- ABERTO COM KIT -->
<!-- ========================================= -->

<a
  href="abertcomkit.html"
  class="card"
>

<div class="card-title">
GMG ABERTO COM KIT
</div>

<div class="card-text">
Layout de sala para gerador aberto com kit de atenuação
</div>

</a>

<!-- ========================================= -->
<!-- ABERTO SEM KIT -->
<!-- ========================================= -->

<a
  href="abertosemkit.html"
  class="card"
>

<div class="card-title">
GMG ABERTO SEM KIT
</div>

<div class="card-text">
Layout de sala para gerador aberto sem atenuação
</div>

</a>

</div>

</div>

</body>

</html>
