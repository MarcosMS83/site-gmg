<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Geradores - Debug Coordenadas PDF</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/downloadjs@1.4.7"></script>

<style>

body{
  font-family:Arial;
  background:#f4f4f4;
  padding:40px;
}

.container{
  max-width:700px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:20px;
}

h1{
  color:#0f4ea8;
  margin-bottom:30px;
}

label{
  display:block;
  margin-top:15px;
  margin-bottom:5px;
  font-weight:bold;
}

input{
  width:100%;
  padding:14px;
  border:1px solid #ccc;
  border-radius:10px;
}

button{
  width:100%;
  padding:18px;
  border:none;
  background:#0f4ea8;
  color:white;
  font-size:18px;
  border-radius:12px;
  cursor:pointer;
  margin-top:30px;
}

button:hover{
  background:#0b3d84;
}

.info{
  margin-top:30px;
  background:#eef3ff;
  padding:20px;
  border-radius:12px;
  line-height:1.7;
}

.code{
  background:#111;
  color:#0f0;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
  font-family:monospace;
  font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>MS GERADORES - DEBUG PDF</h1>

<label>Potência</label>
<input type="number" id="potencia">

<label>Comprimento</label>
<input type="number" id="comprimento">

<label>Largura</label>
<input type="number" id="largura">

<label>Altura</label>
<input type="number" id="altura">

<button onclick="gerarPDF()">
GERAR PDF DEBUG
</button>

<div class="info">

<b>COMO DESCOBRIR POSIÇÕES:</b>

<div class="code">

x = esquerda/direita<br>
y = baixo/cima

</div>

<br>

Exemplo:

<div class="code">

page.drawText("2200",{<br>
x:216,<br>
y:325,<br>
size:7<br>
});

</div>

</div>

</div>

<script>

async function gerarPDF(){

  const potencia =
    document.getElementById("potencia").value;

  const comprimento =
    parseInt(
      document.getElementById("comprimento").value
    );

  const largura =
    parseInt(
      document.getElementById("largura").value
    );

  const altura =
    parseInt(
      document.getElementById("altura").value
    );

  if(
    !potencia ||
    !comprimento ||
    !largura ||
    !altura
  ){

    alert("Preencha todos os campos");

    return;

  }

  /*
  REGRAS
  */

  const comprimentoBase =
    comprimento + 2000;

  const larguraBase =
    largura + 2000;

  /*
  PDF
  */

  const existingPdfBytes =
    await fetch(
      "Dimensional GMG 25 KVA.pdf"
    ).then(res => res.arrayBuffer());

  const pdfDoc =
    await PDFLib.PDFDocument.load(
      existingPdfBytes
    );

  const page =
    pdfDoc.getPages()[0];

  const white =
    PDFLib.rgb(1,1,1);

  const black =
    PDFLib.rgb(0,0,0);

  const gray =
    PDFLib.rgb(0.85,0.85,0.85);

  const red =
    PDFLib.rgb(1,0,0);

  const font =
    await pdfDoc.embedFont(
      PDFLib.StandardFonts.Helvetica
    );

  /*
  =========================================
  GRID DEBUG
  =========================================
  */

  for(let x=0;x<900;x+=20){

    page.drawLine({
      start:{x:x,y:0},
      end:{x:x,y:700},
      thickness:0.3,
      color:gray
    });

    page.drawText(
      String(x),
      {
        x:x+1,
        y:2,
        size:4,
        font:font,
        color:red
      }
    );

  }

  for(let y=0;y<700;y+=20){

    page.drawLine({
      start:{x:0,y:y},
      end:{x:900,y:y},
      thickness:0.3,
      color:gray
    });

    page.drawText(
      String(y),
      {
        x:2,
        y:y+1,
        size:4,
        font:font,
        color:red
      }
    );

  }

  /*
  =========================================
  APAGAR TEXTO ANTIGO
  =========================================
  */

  function apagar(x,y,w,h){

    page.drawRectangle({
      x:x,
      y:y,
      width:w,
      height:h,
      color:white,
      borderWidth:0
    });

  }

  apagar(286,77,55,11);

  apagar(214,323,55,11);

  apagar(98,159,55,11);

  apagar(67,440,40,11);

  apagar(618,323,45,11);

  apagar(340,12,210,11);

  /*
  =========================================
  ESCREVER
  =========================================
  */

  page.drawText(
    String(comprimentoBase),
    {
      x:288,
      y:79,
      size:7,
      font:font,
      color:black
    }
  );

  page.drawText(
    String(comprimento),
    {
      x:216,
      y:375,
      size:7,
      font:font,
      color:black
    }
  );

  page.drawText(
    String(larguraBase),
    {
      x:100,
      y:161,
      size:7,
      font:font,
      color:black
    }
  );

  page.drawText(
    String(largura),
    {
      x:69,
      y:442,
      size:7,
      font:font,
      color:black
    }
  );

  page.drawText(
    String(altura),
    {
      x:620,
      y:325,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  TITULO
  */

  page.drawText(
    `DIMENSIONAL COM BASE GMG ${potencia}KVA -`,
    {
      x:343,
      y:14,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  SALVAR
  */

  const pdfBytes =
    await pdfDoc.save();

  download(
    pdfBytes,
    `DEBUG_GMG_${potencia}KVA.pdf`,
    "application/pdf"
  );

}

</script>

</body>

</html>
