<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Geradores - PDF</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/downloadjs@1.4.7"></script>

<style>

body{
  font-family:Arial;
  background:#f4f4f4;
  padding:40px;
}

.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.logo-area{
  text-align:center;
  margin-bottom:20px;
}

.logo-ms{
  max-width:91px;
}

h1{
  margin-bottom:15px;
  color:#0f4ea8;
  text-align:center;
}

.subtitle{
  margin-bottom:30px;
  color:#666;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  border:1px solid #ddd;
  padding:20px;
  border-radius:12px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:bold;
}

input{
  width:100%;
  padding:14px;
  border:1px solid #ccc;
  border-radius:10px;
  font-size:16px;
}

small{
  color:#777;
  display:block;
  margin-top:6px;
}

button{
  width:100%;
  padding:18px;
  border:none;
  background:#0f4ea8;
  color:white;
  font-size:18px;
  border-radius:12px;
  cursor:pointer;
  margin-top:30px;
  font-weight:bold;
}

button:hover{
  background:#0b3d84;
}

</style>

</head>

<body>

<div class="container">

<div class="logo-area">

<img
  src="logo.jpeg"
  alt="MS Geradores"
  class="logo-ms"
>

</div>

<h1>MS GERADORES</h1>

<div class="subtitle">
Gerador automático de PDF dimensional
</div>

<div class="grid">

<div class="card">
<label>Potência (kVA)</label>
<input type="number" id="potencia">
</div>

<div class="card">
<label>Largura (mm)</label>
<input type="number" id="largura">
</div>

<div class="card">
<label>Altura (mm)</label>
<input type="number" id="altura">
</div>

<div class="card">
<label>Comprimento (mm)</label>
<input type="number" id="comprimento">
</div>

<div class="card">
<label>Peso (kg)</label>
<input type="number" id="peso">

<small>
Se deixar vazio o peso não será inserido no PDF
</small>

</div>

<div class="card">
<label>Número do Projeto</label>

<input
  type="text"
  id="numeroProjeto"
>

<small>
Se deixar vazio o número do projeto não será inserido no PDF
</small>

</div>

</div>

<button onclick="gerarPDF()">
GERAR PDF
</button>

</div>

<script>

/* ========================================= */
/* PDF CARENADO */
/* ========================================= */

async function gerarPDF(){

  const potencia =
    document.getElementById("potencia").value;

  const altura =
    parseInt(document.getElementById("altura").value);

  const largura =
    parseInt(document.getElementById("largura").value);

  const comprimento =
    parseInt(document.getElementById("comprimento").value);

  const peso =
    document.getElementById("peso").value;

  const numeroProjeto =
    document.getElementById("numeroProjeto").value;

  if(
    !potencia ||
    !altura ||
    !largura ||
    !comprimento
  ){
    alert("Preencha os campos obrigatórios.");
    return;
  }

  /* ========================================= */
  /* BASE */
  /* ========================================= */

  const larguraBase =
    largura + 2000;

  const comprimentoBase =
    comprimento + 2000;

  /* ========================================= */
  /* CARREGA PDF */
  /* ========================================= */

  const existingPdfBytes =
    await fetch(
      "Dimensional GMG 25 KVA.pdf"
    ).then(res => res.arrayBuffer());

  /* ========================================= */
  /* ABRE PDF */
  /* ========================================= */

  const pdfDoc =
    await PDFLib.PDFDocument.load(existingPdfBytes);

  const page =
    pdfDoc.getPages()[0];

  const black =
    PDFLib.rgb(0,0,0);

  const font =
    await pdfDoc.embedFont(
      PDFLib.StandardFonts.Helvetica
    );

  /* ========================================= */
  /* MEDIDAS GMG */
  /* ========================================= */

  page.drawText(
    String(altura),
    {
      x:85,
      y:430,
      size:7,
      font,
      color:black
    }
  );

  page.drawText(
    String(largura),
    {
      x:620,
      y:325,
      size:7,
      font,
      color:black
    }
  );

  page.drawText(
    String(comprimento),
    {
      x:235,
      y:328,
      size:7,
      font,
      color:black
    }
  );

  /* ========================================= */
  /* BASE */
  /* ========================================= */

  page.drawText(
    String(larguraBase),
    {
      x:85,
      y:218,
      size:7,
      font,
      color:black
    }
  );

  page.drawText(
    String(comprimentoBase),
    {
      x:235,
      y:297,
      size:7,
      font,
      color:black
    }
  );

  page.drawText(
    String(comprimentoBase),
    {
      x:620,
      y:210,
      size:7,
      font,
      color:black
    }
  );

  /* ========================================= */
  /* OPCIONAIS */
  /* ========================================= */

  if(peso){

    page.drawText(
      `Peso: ${peso} kg`,
      {
        x:605,
        y:60,
        size:7,
        font,
        color:black
      }
    );

  }

  if(numeroProjeto){

    page.drawText(
      `Projeto: ${numeroProjeto}`,
      {
        x:605,
        y:48,
        size:7,
        font,
        color:black
      }
    );

  }

  /* ========================================= */
  /* POTÊNCIA */
  /* ========================================= */

  page.drawText(
    `${potencia}kVA`,
    {
      x:710,
      y:32,
      size:7,
      font,
      color:black
    }
  );

  /* ========================================= */
  /* SALVA */
  /* ========================================= */

  const pdfBytes =
    await pdfDoc.save();

  download(
    pdfBytes,
    `GMG_${potencia}kVA.pdf`,
    "application/pdf"
  );

}

</script>

</body>

</html>
