<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Geradores - PDF</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/downloadjs@1.4.7"></script>

<style>

body{
  font-family:Arial;
  background:#f4f4f4;
  padding:40px;
}

.container{
  max-width:700px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:20px;
}

h1{
  margin-bottom:30px;
  color:#0f4ea8;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  border:1px solid #ddd;
  padding:20px;
  border-radius:12px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:bold;
}

input{
  width:100%;
  padding:14px;
  border:1px solid #ccc;
  border-radius:10px;
}

button{
  width:100%;
  padding:18px;
  border:none;
  background:#0f4ea8;
  color:white;
  font-size:18px;
  border-radius:12px;
  cursor:pointer;
  margin-top:30px;
}

button:hover{
  background:#0b3d84;
}

.subtitle{
  margin-bottom:25px;
  color:#666;
  text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>MS GERADORES</h1>

<div class="subtitle">
Gerador automático de PDF dimensional
</div>

<div class="grid">

<div class="card">

<label>Potência (KVA)</label>
<input type="number" id="potencia">

</div>

<div class="card">

<label>Largura (mm)</label>
<input type="number" id="largura">

</div>

<div class="card">

<label>Altura (mm)</label>
<input type="number" id="altura">

</div>

<div class="card">

<label>Comprimento (mm)</label>
<input type="number" id="comprimento">

</div>

</div>

<button onclick="gerarPDF()">
GERAR PDF
</button>

</div>

<script>

async function gerarPDF(){

  /*
  VALORES
  */

  const potencia =
    document.getElementById("potencia").value;

  const altura =
    parseInt(
      document.getElementById("altura").value
    );

  const largura =
    parseInt(
      document.getElementById("largura").value
    );

  const comprimento =
    parseInt(
      document.getElementById("comprimento").value
    );

  /*
  VALIDAR
  */

  if(
    !potencia ||
    !altura ||
    !largura ||
    !comprimento
  ){

    alert("Preencha todos os campos.");

    return;

  }

  /*
  REGRAS
  */

  const larguraBase =
    largura + 2000;

  const comprimentoBase =
    comprimento + 2000;

  /*
  COORDENADAS FIXAS
  */

  const alturaX = 75;
  const alturaY = 430;

  const larguraX = 620;
  const larguraY = 325;

  const comprimentoX = 235;
  const comprimentoY = 328;

  const larguraBase1X = 80;
  const larguraBase1Y = 220;

  const larguraBase2X = 300;
  const larguraBase2Y = 220;

  const comprimentoBaseX = 235;
  const comprimentoBaseY = 297;

  /*
  PDF
  */

  const existingPdfBytes =
    await fetch(
      "Dimensional GMG 25 KVA.pdf"
    ).then(res => res.arrayBuffer());

  const pdfDoc =
    await PDFLib.PDFDocument.load(
      existingPdfBytes
    );

  const page =
    pdfDoc.getPages()[0];

  const black =
    PDFLib.rgb(0,0,0);

  const font =
    await pdfDoc.embedFont(
      PDFLib.StandardFonts.Helvetica
    );

  /*
  ALTURA
  */

  page.drawText(
    String(altura),
    {
      x:alturaX,
      y:alturaY,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  LARGURA
  */

  page.drawText(
    String(largura),
    {
      x:larguraX,
      y:larguraY,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  COMPRIMENTO
  */

  page.drawText(
    String(comprimento),
    {
      x:comprimentoX,
      y:comprimentoY,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  LARGURA BASE 1
  */

  page.drawText(
    String(larguraBase),
    {
      x:larguraBase1X,
      y:larguraBase1Y,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  LARGURA BASE 2
  */

  page.drawText(
    String(larguraBase),
    {
      x:larguraBase2X,
      y:larguraBase2Y,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  COMPRIMENTO BASE
  */

  page.drawText(
    String(comprimentoBase),
    {
      x:comprimentoBaseX,
      y:comprimentoBaseY,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  TITULO PDF
  */

  page.drawText(
    `DIMENSIONAL COM BASE GMG ${potencia}KVA`,
    {
      x:343,
      y:14,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  SALVAR
  */

  const pdfBytes =
    await pdfDoc.save();

  download(
    pdfBytes,
    `GMG_${potencia}KVA.pdf`,
    "application/pdf"
  );

}

</script>

</body>

</html>
