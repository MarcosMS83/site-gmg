<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MS Geradores - Dimensional GMG</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#f2f5f9;
      padding:40px;
    }

    .container{
      max-width:1000px;
      margin:auto;
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    .logo{
      text-align:center;
      margin-bottom:30px;
    }

    .logo h1{
      color:#0f4ea8;
      font-size:40px;
    }

    .subtitle{
      text-align:center;
      color:#666;
      margin-bottom:40px;
      font-size:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
    }

    .field{
      display:flex;
      flex-direction:column;
    }

    label{
      margin-bottom:8px;
      font-weight:bold;
      color:#333;
    }

    input{
      padding:15px;
      border-radius:12px;
      border:1px solid #ccc;
      font-size:16px;
    }

    .button{
      margin-top:35px;
    }

    button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:14px;
      background:#0f4ea8;
      color:white;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#093779;
    }

    .preview{
      margin-top:50px;
      padding:30px;
      background:#fafafa;
      border-radius:16px;
      border:2px dashed #ccc;
    }

    .preview-title{
      font-size:22px;
      font-weight:bold;
      margin-bottom:25px;
      color:#0f4ea8;
      text-align:center;
    }

    .drawing{
      width:100%;
      height:420px;
      background:white;
      border:2px solid #ddd;
      position:relative;
      overflow:hidden;
      border-radius:10px;
    }

    .base{
      width:75%;
      height:140px;
      background:#d8d8d8;
      border:3px solid #444;
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:60px;
    }

    .gmg{
      width:50%;
      height:120px;
      background:#b8c8e8;
      border:3px solid #0f4ea8;
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:210px;
    }

    .measure{
      position:absolute;
      background:white;
      padding:4px 10px;
      font-weight:bold;
      border-radius:8px;
      border:1px solid #ccc;
      color:#111;
    }

    .bottom-measure{
      bottom:15px;
      left:50%;
      transform:translateX(-50%);
    }

    .left-measure{
      left:15px;
      top:50%;
      transform:translateY(-50%) rotate(-90deg);
    }

    .right-measure{
      right:15px;
      top:50%;
      transform:translateY(-50%) rotate(-90deg);
    }

    .power{
      top:20px;
      left:50%;
      transform:translateX(-50%);
      background:#0f4ea8;
      color:white;
    }

    .footer{
      margin-top:35px;
      text-align:center;
      color:#777;
      font-size:14px;
    }

    @media(max-width:700px){

      body{
        padding:15px;
      }

      .container{
        padding:20px;
      }

      .grid{
        grid-template-columns:1fr;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <div class="logo">
      <h1>MS GERADORES</h1>
    </div>

    <div class="subtitle">
      Sistema Automático de Dimensionais GMG
    </div>

    <div class="grid">

      <div class="field">
        <label>Potência (KVA)</label>
        <input type="number" id="potencia" placeholder="Ex: 55">
      </div>

      <div class="field">
        <label>Comprimento (mm)</label>
        <input type="number" id="comprimento" placeholder="Ex: 4200">
      </div>

      <div class="field">
        <label>Altura (mm)</label>
        <input type="number" id="altura" placeholder="Ex: 1280">
      </div>

      <div class="field">
        <label>Largura (mm)</label>
        <input type="number" id="largura" placeholder="Ex: 2200">
      </div>

    </div>

    <div class="button">
      <button onclick="gerarPDF()">
        GERAR E BAIXAR PDF
      </button>
    </div>

    <div class="preview">

      <div class="preview-title">
        Pré-visualização do Dimensional
      </div>

      <div class="drawing">

        <div class="gmg"></div>

        <div class="base"></div>

        <div class="measure power" id="potenciaPreview">
          25 KVA
        </div>

        <div class="measure bottom-measure" id="comprimentoPreview">
          4200 mm
        </div>

        <div class="measure left-measure" id="alturaPreview">
          1280 mm
        </div>

        <div class="measure right-measure" id="larguraPreview">
          2200 mm
        </div>

      </div>

    </div>

    <div class="footer">
      MS Geradores © Todos os direitos reservados
    </div>

  </div>

  <script>

    const potencia = document.getElementById("potencia");
    const comprimento = document.getElementById("comprimento");
    const altura = document.getElementById("altura");
    const largura = document.getElementById("largura");

    potencia.addEventListener("input", () => {
      document.getElementById("potenciaPreview").innerText =
        potencia.value + " KVA";
    });

    comprimento.addEventListener("input", () => {
      document.getElementById("comprimentoPreview").innerText =
        comprimento.value + " mm";
    });

    altura.addEventListener("input", () => {
      document.getElementById("alturaPreview").innerText =
        altura.value + " mm";
    });

    largura.addEventListener("input", () => {
      document.getElementById("larguraPreview").innerText =
        largura.value + " mm";
    });

    async function gerarPDF(){

      const { jsPDF } = window.jspdf;

      const doc = new jsPDF({
        orientation: "landscape"
      });

      const pot = potencia.value || "25";
      const comp = comprimento.value || "4200";
      const alt = altura.value || "1280";
      const larg = largura.value || "2200";

      doc.setFontSize(24);
      doc.text("MS GERADORES", 20, 20);

      doc.setFontSize(18);
      doc.text(`DIMENSIONAL GMG ${pot} KVA`, 20, 35);

      doc.setLineWidth(1);

      doc.rect(40, 70, 220, 80);

      doc.rect(85, 90, 130, 40);

      doc.setFontSize(14);

      doc.text(`${comp} mm`, 125, 165);

      doc.text(`${alt} mm`, 30, 120, {angle:90});

      doc.text(`${larg} mm`, 265, 120, {angle:90});

      doc.text(`Potência: ${pot} KVA`, 20, 190);

      doc.text(`Comprimento: ${comp} mm`, 20, 200);

      doc.text(`Altura: ${alt} mm`, 20, 210);

      doc.text(`Largura: ${larg} mm`, 20, 220);

      doc.save(`Dimensional_GMG_${pot}KVA.pdf`);

    }

  </script>

</body>

</html>
