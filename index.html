<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Geradores</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/downloadjs@1.4.7"></script>

<style>

body{
  font-family:Arial;
  background:#f4f4f4;
  padding:40px;
}

.container{
  max-width:700px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:20px;
}

h1{
  margin-bottom:30px;
  color:#0f4ea8;
}

label{
  display:block;
  margin-top:15px;
  margin-bottom:5px;
  font-weight:bold;
}

input{
  width:100%;
  padding:14px;
  border:1px solid #ccc;
  border-radius:10px;
}

button{
  width:100%;
  padding:18px;
  border:none;
  background:#0f4ea8;
  color:white;
  font-size:18px;
  border-radius:12px;
  cursor:pointer;
  margin-top:30px;
}

button:hover{
  background:#0b3d84;
}

</style>

</head>

<body>

<div class="container">

<h1>MS GERADORES</h1>

<label>Potência (KVA)</label>
<input type="number" id="potencia">

<label>Comprimento (mm)</label>
<input type="number" id="comprimento">

<label>Largura (mm)</label>
<input type="number" id="largura">

<label>Altura (mm)</label>
<input type="number" id="altura">

<button onclick="gerarPDF()">
GERAR PDF
</button>

</div>

<script>

async function gerarPDF(){

  /*
  CAMPOS
  */

  const potencia =
    document.getElementById("potencia").value;

  const comprimento =
    parseInt(
      document.getElementById("comprimento").value
    );

  const largura =
    parseInt(
      document.getElementById("largura").value
    );

  const altura =
    parseInt(
      document.getElementById("altura").value
    );

  /*
  VALIDAR
  */

  if(
    !potencia ||
    !comprimento ||
    !largura ||
    !altura
  ){

    alert("Preencha todos os campos");

    return;

  }

  /*
  REGRAS
  */

  const larguraBase =
    largura + 2000;

  const comprimentoBase =
    comprimento + 2000;

  /*
  CARREGAR PDF
  */

  const existingPdfBytes =
    await fetch(
      "Dimensional GMG 25 KVA.pdf"
    ).then(res => res.arrayBuffer());

  const pdfDoc =
    await PDFLib.PDFDocument.load(
      existingPdfBytes
    );

  const page =
    pdfDoc.getPages()[0];

  const black =
    PDFLib.rgb(0,0,0);

  const font =
    await pdfDoc.embedFont(
      PDFLib.StandardFonts.Helvetica
    );

  /*
  ===================================
  ESCREVER NOVOS VALORES
  ===================================
  */

  /*
  ALTURA
  ALTERADO:
  X=415
  Y=150
  */

  page.drawText(
    String(altura),
    {
      x:415,
      y:150,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  LARGURA
  X=100
  Y=200
  */

  page.drawText(
    String(largura),
    {
      x:100,
      y:200,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  COMPRIMENTO
  X=200
  Y=200
  */

  page.drawText(
    String(comprimento),
    {
      x:200,
      y:200,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  LARGURA BASE
  largura + 2000
  X=300
  Y=250
  */

  page.drawText(
    String(larguraBase),
    {
      x:300,
      y:250,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  COMPRIMENTO BASE
  comprimento + 2000
  X=350
  Y=250
  */

  page.drawText(
    String(comprimentoBase),
    {
      x:350,
      y:250,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  TITULO
  */

  page.drawText(
    `DIMENSIONAL COM BASE GMG ${potencia}KVA -`,
    {
      x:343,
      y:14,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  SALVAR
  */

  const pdfBytes =
    await pdfDoc.save();

  download(
    pdfBytes,
    `GMG_${potencia}KVA.pdf`,
    "application/pdf"
  );

}

</script>

</body>

</html>
