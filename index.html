<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Geradores - Coordenadas</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/downloadjs@1.4.7"></script>

<style>

body{
  font-family:Arial;
  background:#f4f4f4;
  padding:40px;
}

.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:20px;
}

h1{
  margin-bottom:30px;
  color:#0f4ea8;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  border:1px solid #ddd;
  padding:20px;
  border-radius:12px;
}

label{
  display:block;
  margin-top:10px;
  margin-bottom:5px;
  font-weight:bold;
}

input{
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:10px;
}

button{
  width:100%;
  padding:18px;
  border:none;
  background:#0f4ea8;
  color:white;
  font-size:18px;
  border-radius:12px;
  cursor:pointer;
  margin-top:30px;
}

button:hover{
  background:#0b3d84;
}

.subtitle{
  margin-bottom:25px;
  color:#666;
}

</style>

</head>

<body>

<div class="container">

<h1>MS GERADORES</h1>

<div class="subtitle">
Defina apenas as medidas principais e ajuste as coordenadas desejadas
</div>

<div class="grid">

<!-- MEDIDAS PRINCIPAIS -->

<div class="card">

<h3>Potência</h3>

<label>Potência (KVA)</label>
<input type="number" id="potencia">

</div>

<div class="card">

<h3>Largura</h3>

<label>Largura (mm)</label>
<input type="number" id="largura">

</div>

<div class="card">

<h3>Altura</h3>

<label>Altura (mm)</label>
<input type="number" id="altura">

</div>

<div class="card">

<h3>Comprimento</h3>

<label>Comprimento (mm)</label>
<input type="number" id="comprimento">

</div>

<!-- COORDENADAS -->

<div class="card">

<h3>Coordenadas Altura</h3>

<label>X</label>
<input type="number" id="alturaX" value="75">

<label>Y</label>
<input type="number" id="alturaY" value="430">

</div>

<div class="card">

<h3>Coordenadas Largura</h3>

<label>X</label>
<input type="number" id="larguraX" value="620">

<label>Y</label>
<input type="number" id="larguraY" value="325">

</div>

<div class="card">

<h3>Coordenadas Comprimento</h3>

<label>X</label>
<input type="number" id="comprimentoX" value="235">

<label>Y</label>
<input type="number" id="comprimentoY" value="328">

</div>

<!-- LARGURA BASE 1 -->

<div class="card">

<h3>Largura Base (+2000) - POSIÇÃO 1</h3>

<label>X</label>
<input type="number" id="larguraBase1X" value="80">

<label>Y</label>
<input type="number" id="larguraBase1Y" value="220">

</div>

<!-- LARGURA BASE 2 -->

<div class="card">

<h3>Largura Base (+2000) - POSIÇÃO 2</h3>

<label>X</label>
<input type="number" id="larguraBase2X" value="300">

<label>Y</label>
<input type="number" id="larguraBase2Y" value="220">

</div>

<!-- COMPRIMENTO BASE -->

<div class="card">

<h3>Comprimento Base (+2000)</h3>

<label>X</label>
<input type="number" id="comprimentoBaseX" value="235">

<label>Y</label>
<input type="number" id="comprimentoBaseY" value="297">

</div>

</div>

<button onclick="gerarPDF()">
GERAR PDF
</button>

</div>

<script>

async function gerarPDF(){

  /*
  VALORES
  */

  const potencia =
    document.getElementById("potencia").value;

  const altura =
    parseInt(
      document.getElementById("altura").value
    );

  const largura =
    parseInt(
      document.getElementById("largura").value
    );

  const comprimento =
    parseInt(
      document.getElementById("comprimento").value
    );

  /*
  COORDENADAS
  */

  const alturaX =
    parseInt(
      document.getElementById("alturaX").value
    );

  const alturaY =
    parseInt(
      document.getElementById("alturaY").value
    );

  const larguraX =
    parseInt(
      document.getElementById("larguraX").value
    );

  const larguraY =
    parseInt(
      document.getElementById("larguraY").value
    );

  const comprimentoX =
    parseInt(
      document.getElementById("comprimentoX").value
    );

  const comprimentoY =
    parseInt(
      document.getElementById("comprimentoY").value
    );

  /*
  LARGURA BASE DUPLICADA
  */

  const larguraBase1X =
    parseInt(
      document.getElementById("larguraBase1X").value
    );

  const larguraBase1Y =
    parseInt(
      document.getElementById("larguraBase1Y").value
    );

  const larguraBase2X =
    parseInt(
      document.getElementById("larguraBase2X").value
    );

  const larguraBase2Y =
    parseInt(
      document.getElementById("larguraBase2Y").value
    );

  /*
  COMPRIMENTO BASE
  */

  const comprimentoBaseX =
    parseInt(
      document.getElementById("comprimentoBaseX").value
    );

  const comprimentoBaseY =
    parseInt(
      document.getElementById("comprimentoBaseY").value
    );

  /*
  REGRAS
  */

  const larguraBase =
    largura + 2000;

  const comprimentoBase =
    comprimento + 2000;

  /*
  PDF
  */

  const existingPdfBytes =
    await fetch(
      "Dimensional GMG 25 KVA.pdf"
    ).then(res => res.arrayBuffer());

  const pdfDoc =
    await PDFLib.PDFDocument.load(
      existingPdfBytes
    );

  const page =
    pdfDoc.getPages()[0];

  const black =
    PDFLib.rgb(0,0,0);

  const font =
    await pdfDoc.embedFont(
      PDFLib.StandardFonts.Helvetica
    );

  /*
  ALTURA
  */

  page.drawText(
    String(altura),
    {
      x:alturaX,
      y:alturaY,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  LARGURA
  */

  page.drawText(
    String(largura),
    {
      x:larguraX,
      y:larguraY,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  COMPRIMENTO
  */

  page.drawText(
    String(comprimento),
    {
      x:comprimentoX,
      y:comprimentoY,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  LARGURA BASE - POSIÇÃO 1
  */

  page.drawText(
    String(larguraBase),
    {
      x:larguraBase1X,
      y:larguraBase1Y,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  LARGURA BASE - POSIÇÃO 2
  */

  page.drawText(
    String(larguraBase),
    {
      x:larguraBase2X,
      y:larguraBase2Y,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  COMPRIMENTO BASE
  */

  page.drawText(
    String(comprimentoBase),
    {
      x:comprimentoBaseX,
      y:comprimentoBaseY,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  TITULO
  */

  page.drawText(
    `DIMENSIONAL COM BASE GMG ${potencia}KVA -`,
    {
      x:343,
      y:14,
      size:7,
      font:font,
      color:black
    }
  );

  /*
  SALVAR
  */

  const pdfBytes =
    await pdfDoc.save();

  download(
    pdfBytes,
    `GMG_${potencia}KVA.pdf`,
    "application/pdf"
  );

}

</script>

</body>

</html>
