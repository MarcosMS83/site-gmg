<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Geradores - PDF</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/downloadjs@1.4.7"></script>

<style>

body{
  font-family:Arial;
  background:#f4f4f4;
  padding:40px;
}

.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.logo-area{
  text-align:center;
  margin-bottom:20px;
}

.logo-ms{
  max-width:91px;
}

h1{
  margin-bottom:15px;
  color:#0f4ea8;
  text-align:center;
}

.subtitle{
  margin-bottom:30px;
  color:#666;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  border:1px solid #ddd;
  padding:20px;
  border-radius:12px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:bold;
}

input{
  width:100%;
  padding:14px;
  border:1px solid #ccc;
  border-radius:10px;
  font-size:16px;
}

small{
  color:#777;
  display:block;
  margin-top:6px;
}

button{
  width:100%;
  padding:18px;
  border:none;
  background:#0f4ea8;
  color:white;
  font-size:18px;
  border-radius:12px;
  cursor:pointer;
  margin-top:30px;
  font-weight:bold;
}

button:hover{
  background:#0b3d84;
}

</style>

</head>

<body>

<div class="container">

<div class="logo-area">

<img
  src="logo.jpeg"
  alt="MS Geradores"
  class="logo-ms"
>

</div>

<h1>MS GERADORES</h1>

<div class="subtitle">
LAYOUT DE SALA PARA GMG ABERTO SEM ATENUAÇÃO
</div>

<div class="grid">

<div class="card">
<label>Potência (kVA)</label>
<input type="number" id="salaPotencia">
</div>

<div class="card">
<label>Comprimento GMG (mm)</label>
<input type="number" id="gmgComprimento">
</div>

<div class="card">
<label>Largura GMG (mm)</label>
<input type="number" id="gmgLargura">
</div>

<div></div>

<!-- ========================================= -->
<!-- OPCIONAIS -->
<!-- ========================================= -->

<div
  style="
    grid-column:1 / -1;
    font-weight:bold;
    color:#0f4ea8;
    margin-top:10px;
    margin-bottom:-5px;
    font-size:18px;
  "
>
OPCIONAIS
</div>

<div class="card">
<label>Peso (kg)</label>
<input type="number" id="salaPeso">

<small>
Se deixar vazio o peso não será inserido no PDF
</small>

</div>

<div class="card">
<label>Número do Projeto</label>

<input
  type="text"
  id="salaProjeto"
>

<small>
Se deixar vazio o número do projeto não será inserido no PDF
</small>

</div>

</div>

<button onclick="gerarPDFSala()">
GERAR PDF SALA
</button>

</div>

<script>

/* ========================================= */
/* PDF SALA */
/* ========================================= */

async function gerarPDFSala(){

  const potencia =
    document.getElementById("salaPotencia").value;

  const gmgComprimento =
    parseInt(document.getElementById("gmgComprimento").value);

  const gmgLargura =
    parseInt(document.getElementById("gmgLargura").value);

  const peso =
    document.getElementById("salaPeso").value;

  const numeroProjeto =
    document.getElementById("salaProjeto").value;

  if(
    !potencia ||
    !gmgComprimento ||
    !gmgLargura
  ){
    alert("Preencha os campos obrigatórios.");
    return;
  }

  const peDireito = 3000;

  const comprimentoSala =
    gmgComprimento + 800;

  const larguraSala =
    gmgLargura + 2400;

  /* ========================================= */
  /* CARREGA PDF */
  /* ========================================= */

  const existingPdfBytes =
    await fetch(
      "Sala_Gerador_Sem_Atenuacao.pdf"
    ).then(res => res.arrayBuffer());

  /* ========================================= */
  /* ABRE PDF */
  /* ========================================= */

  const pdfDoc =
    await PDFLib.PDFDocument.load(existingPdfBytes);

  const page =
    pdfDoc.getPages()[0];

  const black =
    PDFLib.rgb(0,0,0);

  const font =
    await pdfDoc.embedFont(
      PDFLib.StandardFonts.Helvetica
    );

  /* ========================================= */
  /* MEDIDAS */
  /* ========================================= */

  page.drawText(
    String(gmgLargura),
    {
      x:350,
      y:800,
      size:7,
      rotate: PDFLib.degrees(180),
      font,
      color:black
    }
  );

  page.drawText(
    String(gmgComprimento),
    {
      x:650,
      y:600,
      size:7,
      rotate: PDFLib.degrees(90),
      font,
      color:black
    }
  );

  page.drawText(
    String(peDireito),
    {
      x:700,
      y:600,
      size:7,
      rotate: PDFLib.degrees(180),
      font,
      color:black
    }
  );

  page.drawText(
    String(larguraSala),
    {
      x:750,
      y:600,
      size:7,
      rotate: PDFLib.degrees(180),
      font,
      color:black
    }
  );

  page.drawText(
    String(comprimentoSala),
    {
      x:547,
      y:867,
      size:7,
      rotate: PDFLib.degrees(90),
      font,
      color:black
    }
  );

  /* ========================================= */
  /* OPCIONAIS */
  /* ========================================= */

  if(peso){

    page.drawText(
      `Peso: ${peso} kg`,
      {
        x:790,
        y:800,
        size:7,
        rotate: PDFLib.degrees(90),
        font,
        color:black
      }
    );

  }

  if(numeroProjeto){

    page.drawText(
      `Projeto: ${numeroProjeto}`,
      {
        x:800,
        y:800,
        size:7,
        rotate: PDFLib.degrees(90),
        font,
        color:black
      }
    );

  }

  /* ========================================= */
  /* POTÊNCIA */
  /* ========================================= */

  page.drawText(
    `${potencia}kVA`,
    {
      x:710,
      y:800,
      size:14,
      font,
      color:black
    }
  );

  /* ========================================= */
  /* SALVA PDF */
  /* ========================================= */

  const pdfBytes =
    await pdfDoc.save();

  download(
    pdfBytes,
    `LAYOUT_SALA_${potencia}KVA.pdf`,
    "application/pdf"
  );

}

</script>

</body>

</html>
